<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Center AI — Ops Dashboard (MVP1)</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --border:#262b36; --text:#e6e8ee; --muted:#8b93a7;
          --accent:#5b8cff; --ok:#33c17a; --warn:#e0a72e; --danger:#e05a5a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .who { color:var(--muted); font-size:13px; }
  nav { display:flex; gap:4px; padding:10px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--muted); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  nav button.active { background:var(--panel); color:var(--text); border-color:var(--border); }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
  .panel h2 { font-size:14px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--border); vertical-align:top; }
  th { color:var(--muted); font-weight:500; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
  .pill.ok { background:rgba(51,193,122,.15); color:var(--ok); }
  .pill.warn { background:rgba(224,167,46,.15); color:var(--warn); }
  .pill.danger { background:rgba(224,90,90,.15); color:var(--danger); }
  .home-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:16px; }
  @media (max-width:800px) { .home-grid { grid-template-columns: 1fr; } }
  .empty { color:var(--muted); font-size:13px; padding:8px 0; }
  #loginScreen { max-width:360px; margin:80px auto; }
  #loginScreen input { width:100%; padding:9px 10px; margin:6px 0 14px; background:#0c0e12; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; }
  #loginScreen label { font-size:12px; color:var(--muted); }
  #loginScreen button, .btn { background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:6px; cursor:pointer; font-size:14px; }
  #loginError { color:var(--danger); font-size:13px; min-height:18px; }
  code { background:#0c0e12; padding:1px 5px; border-radius:4px; font-size:12px; }
  a.linkbtn { color:var(--accent); text-decoration:none; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="panel">
    <h2>Đăng nhập Center AI</h2>
    <label>Control Plane URL</label>
    <input id="cpUrl" value="https://cp.valeron.tech" />
    <label>Email công ty</label>
    <input id="cpEmail" placeholder="thanh@company.local" />
    <label>Mã pilot access code</label>
    <input id="cpAccessCode" type="password" />
    <div id="loginError"></div>
    <button onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Center AI — Ops Dashboard <span style="color:var(--muted); font-weight:400;">(MVP1 pilot)</span></h1>
    <div class="who"><span id="whoami"></span> · <a class="linkbtn" onclick="logout()">đăng xuất</a></div>
  </header>
  <nav id="tabs"></nav>
  <main id="content"></main>
</div>

<script>
const TABS = [
  { id: 'home', label: 'Trang chủ', render: renderHome },
  { id: 'inbox', label: 'Inbox', render: renderInbox },
  { id: 'timeline', label: 'Timeline', render: renderTimeline },
  { id: 'projects', label: 'Projects & Tasks', render: renderProjects },
  { id: 'sessions', label: 'Active Sessions', render: renderSessions },
  { id: 'handoffs', label: 'Handoffs', render: renderHandoffs },
  { id: 'memory', label: 'Project Memory', render: renderMemory },
  { id: 'patterns', label: 'Pattern Library', render: renderPatternLibrary },
  { id: 'seats', label: 'Seats & Employees', render: renderSeats },
  { id: 'governance', label: 'Governance', render: renderGovernance, adminOnly: true },
  { id: 'kpi', label: 'KPI', render: renderKpi, adminOnly: true },
];
let state = { cpUrl: '', token: '', who: null, active: 'home' };

function loadSession() {
  try { return JSON.parse(localStorage.getItem('centerai_dashboard_session') || 'null'); } catch { return null; }
}
function saveSession() {
  localStorage.setItem('centerai_dashboard_session', JSON.stringify({ cpUrl: state.cpUrl, token: state.token, who: state.who }));
}
function logout() {
  localStorage.removeItem('centerai_dashboard_session');
  location.reload();
}

// 9Router đôi khi nối "data: [DONE]" ngay sau JSON (phát hiện thật ở Bước 1) — Control
// Plane tự nó không có vấn đề này, nhưng parse phòng thủ cho đồng nhất với các nơi khác.
async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text.split('data: [DONE]')[0].trim()); } catch { return {}; }
}

async function api(path) {
  const res = await fetch(state.cpUrl.replace(/\/$/, '') + path, {
    headers: { Authorization: `Bearer ${state.token}` },
  });
  const json = await safeJson(res);
  if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
  return json;
}
async function apiPost(path, body) {
  const res = await fetch(state.cpUrl.replace(/\/$/, '') + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
    body: JSON.stringify(body || {}),
  });
  const json = await safeJson(res);
  if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
  return json;
}

async function doLogin() {
  const cpUrl = document.getElementById('cpUrl').value.trim();
  const email = document.getElementById('cpEmail').value.trim();
  const accessCode = document.getElementById('cpAccessCode').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch(cpUrl.replace(/\/$/, '') + '/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, access_code: accessCode }),
    });
    const json = await safeJson(res);
    if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
    state = { cpUrl, token: json.employee_token, who: { full_name: json.full_name, employee_id: json.employee_id, role: json.role }, active: 'home' };
    saveSession();
    boot();
  } catch (e) {
    errEl.textContent = 'Đăng nhập thất bại: ' + e.message;
  }
}

function fmtElapsed(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h${mins % 60}m`;
}
function fmtDate(iso) { return new Date(iso).toLocaleString('vi-VN'); }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

async function renderHome(root) {
  const [sessions, inbox] = await Promise.all([api('/v1/work-sessions'), api(`/v1/inbox?employee_id=${encodeURIComponent(state.who.employee_id)}`)]);
  let contextNotes = [];
  try {
    const projects = await api('/v1/projects');
    const notesByProject = await Promise.all(projects.projects.map((p) => api(`/v1/projects/${p.id}/context-notes`).catch(() => ({ context_notes: [] }))));
    contextNotes = notesByProject.flatMap((n) => n.context_notes).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
  } catch {}

  root.innerHTML = `
    <div class="home-grid">
      <div class="panel">
        <h2>Đang làm</h2>
        ${sessions.work_sessions.length ? sessions.work_sessions.map((s) => `
          <div style="margin-bottom:8px;">
            <b>${esc(s.employee_name)}</b> — ${esc(s.task_id)} — ${esc(s.task_title)}
            <div class="empty">${fmtElapsed(s.last_activity_at)} trước hoạt động gần nhất, ${esc(s.project_name)}</div>
          </div>`).join('') : '<div class="empty">Không có ai đang làm.</div>'}
      </div>
      <div class="panel">
        <h2>Cần tiếp quản (của tôi)</h2>
        ${inbox.handoffs_to_pick_up.length ? inbox.handoffs_to_pick_up.map((h) => `
          <div style="margin-bottom:8px;">
            <b>${esc(h.task_id)}</b> — handoff mới từ ${esc(h.from_employee_name)}, chưa ai tiếp quản
            <div class="empty">${fmtDate(h.handoff_created_at)}, ${esc(h.project_name)}</div>
          </div>`).join('') : '<div class="empty">Không có gì cần tiếp quản.</div>'}
      </div>
      <div class="panel">
        <h2>Context mới</h2>
        ${contextNotes.length ? contextNotes.map((c) => `
          <div style="margin-bottom:8px;">[${esc(c.type)}] ${esc(c.content)}
            <div class="empty">${esc(c.created_by_name)} — ${fmtDate(c.created_at)}</div>
          </div>`).join('') : '<div class="empty">Chưa có ghi chú context nào (requirement/decision/BA feedback).</div>'}
      </div>
    </div>`;
}

async function renderProjects(root) {
  const { projects } = await api('/v1/projects');
  const taskLists = await Promise.all(projects.map((p) => api(`/v1/projects/${p.id}/tasks`)));
  root.innerHTML = projects.map((p, i) => `
    <div class="panel">
      <h2>${esc(p.name)} <span class="pill ok">${esc(p.status)}</span></h2>
      <table><thead><tr><th>Task ID</th><th>Tiêu đề</th><th>Trạng thái</th><th>Người phụ trách</th><th>Claim (Q20)</th></tr></thead>
      <tbody>${taskLists[i].tasks.map((t) => `
        <tr><td><code>${esc(t.id)}</code></td><td>${esc(t.title)}</td>
        <td><span class="pill ${t.status === 'closed' ? 'ok' : 'warn'}">${esc(t.status)}</span></td>
        <td>${esc(t.assignee_employee_id || '—')}</td>
        <td>${t.claimed_by_employee_id
            ? `<span class="pill warn">${esc(t.claimed_by_name)} đến ${new Date(t.lease_until).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })}</span>`
            : `<span class="empty">${t.claim_mode === 'shared' ? 'shared' : 'chưa ai giữ'}</span>`}</td></tr>`).join('') || `<tr><td colspan="5" class="empty">Chưa có task</td></tr>`}
      </tbody></table>
    </div>`).join('') || '<div class="panel empty">Chưa có project nào.</div>';
}

async function renderSessions(root) {
  const { work_sessions } = await api('/v1/work-sessions');
  root.innerHTML = `<div class="panel"><h2>Active Sessions</h2>
    <table><thead><tr><th>Nhân viên</th><th>Project</th><th>Task</th><th>Bắt đầu</th><th>Hoạt động gần nhất</th></tr></thead>
    <tbody>${work_sessions.map((s) => `
      <tr><td>${esc(s.employee_name)}</td><td>${esc(s.project_name)}</td>
      <td><code>${esc(s.task_id)}</code> — ${esc(s.task_title)}</td>
      <td>${fmtDate(s.started_at)}</td><td>${fmtElapsed(s.last_activity_at)} trước</td></tr>`).join('') ||
      `<tr><td colspan="5" class="empty">Không có Work Session nào đang active.</td></tr>`}
    </tbody></table></div>`;
}

async function renderHandoffs(root) {
  const { handoffs } = await api('/v1/handoffs');
  root.innerHTML = `<div class="panel"><h2>Handoffs gần đây</h2>
    ${handoffs.length ? handoffs.map((h) => `
      <div class="panel" style="background:#12151c;">
        <div><b>${esc(h.task_id)}</b> — ${esc(h.task_title)} <span class="empty">(${esc(h.project_name)})</span></div>
        <div class="empty">Từ ${esc(h.from_employee_name)} — ${fmtDate(h.created_at)}</div>
        <div style="white-space:pre-wrap; margin:8px 0; font-size:13px;">${esc(h.summary)}</div>
        <div class="empty">Bước tiếp theo: ${(h.next_steps || []).map(esc).join(', ') || '(không có)'}</div>
        <div class="empty">Vấn đề mở: ${(h.open_issues || []).map(esc).join(', ') || '(không có)'}</div>
      </div>`).join('') : '<div class="empty">Chưa có handoff nào.</div>'}
    </div>`;
}

async function renderInbox(root) {
  const inbox = await api(`/v1/inbox?employee_id=${encodeURIComponent(state.who.employee_id)}`);
  root.innerHTML = `
    <div class="panel">
      <h2>Task đang giao cho tôi</h2>
      ${inbox.assigned_open_tasks.length ? `<table><thead><tr><th>Task</th><th>Project</th><th>Trạng thái</th></tr></thead>
      <tbody>${inbox.assigned_open_tasks.map((t) => `
        <tr><td><code>${esc(t.id)}</code> — ${esc(t.title)}</td><td>${esc(t.project_name)}</td>
        <td><span class="pill warn">${esc(t.status)}</span></td></tr>`).join('')}</tbody></table>` :
      '<div class="empty">Không có task nào đang giao trực tiếp cho bạn.</div>'}
    </div>
    <div class="panel">
      <h2>Cần tiếp quản — có bàn giao mới chưa ai làm tiếp</h2>
      ${inbox.handoffs_to_pick_up.length ? inbox.handoffs_to_pick_up.map((h) => `
        <div class="panel" style="background:#12151c;">
          <div><b>${esc(h.task_id)}</b> — ${esc(h.task_title)} <span class="empty">(${esc(h.project_name)})</span></div>
          <div class="empty">Bàn giao từ ${esc(h.from_employee_name)} — ${fmtDate(h.handoff_created_at)}</div>
          <div style="white-space:pre-wrap; margin:8px 0; font-size:13px;">${esc(h.summary)}</div>
        </div>`).join('') : '<div class="empty">Không có gì cần tiếp quản.</div>'}
    </div>`;
}

async function renderTimeline(root) {
  const { projects } = await api('/v1/projects');
  if (!projects.length) { root.innerHTML = '<div class="panel empty">Chưa có project nào.</div>'; return; }
  if (!state.timelineProjectId || !projects.some((p) => p.id === state.timelineProjectId)) {
    state.timelineProjectId = projects[0].id;
  }
  const selectHtml = `<select id="timelineProject" onchange="state.timelineProjectId=this.value; switchTab('timeline')" style="background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin-bottom:12px;">
    ${projects.map((p) => `<option value="${esc(p.id)}" ${p.id === state.timelineProjectId ? 'selected' : ''}>${esc(p.name)}</option>`).join('')}
  </select>`;
  const { events } = await api(`/v1/timeline?project_id=${encodeURIComponent(state.timelineProjectId)}`);
  const icons = { work_session_started: '▶', work_session_ended: '⏹', checkpoint: '●', handoff: '↦' };
  root.innerHTML = `<div class="panel">${selectHtml}<h2>Timeline</h2>
    ${events.length ? events.map((e) => `
      <div style="display:flex; gap:10px; padding:6px 0; border-bottom:1px solid var(--border);">
        <div style="width:18px; color:var(--accent);">${icons[e.event_type] || '•'}</div>
        <div>
          <div><b>${esc(e.employee_name)}</b> — ${esc(e.event_type)} — <code>${esc(e.task_id)}</code> ${esc(e.task_title)}</div>
          ${e.detail ? `<div class="empty">${esc(e.detail)}</div>` : ''}
          <div class="empty">${fmtDate(e.occurred_at)}</div>
        </div>
      </div>`).join('') : '<div class="empty">Chưa có sự kiện nào.</div>'}
    </div>`;
}

const CONTEXT_TYPES = ['requirement', 'decision', 'ba_feedback', 'status', 'known_issue', 'next_step', 'handoff', 'code_context'];

async function renderMemory(root) {
  const { projects } = await api('/v1/projects');
  const notesByProject = await Promise.all(projects.map((p) => api(`/v1/projects/${p.id}/context-notes`)));

  const formHtml = `
    <div class="panel">
      <h2>+ Thêm ghi chú context</h2>
      <div class="empty" style="margin-bottom:10px;">Vá gap thật: trước đây project_context không có cách nào tạo mới ngoài seed test.</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:end;">
        <div><label style="font-size:12px;color:var(--muted);">Project</label><br/>
          <select id="ctxProject" style="background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;">
            ${projects.map((p) => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('')}
          </select></div>
        <div><label style="font-size:12px;color:var(--muted);">Task ID (tuỳ chọn)</label><br/>
          <input id="ctxTaskId" placeholder="task_tng142" style="background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;" /></div>
        <div><label style="font-size:12px;color:var(--muted);">Loại</label><br/>
          <select id="ctxType" style="background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;">
            ${CONTEXT_TYPES.map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join('')}
          </select></div>
        <div style="flex:1;min-width:240px;"><label style="font-size:12px;color:var(--muted);">Nội dung</label><br/>
          <input id="ctxContent" placeholder="Nội dung ghi chú" style="width:100%;background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;" /></div>
        <div><label style="font-size:12px;color:var(--muted);">Company Brain scope (Q16)</label><br/>
          <select id="ctxScopeLevel" style="background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;">
            <option value="project" selected>project</option><option value="personal">personal</option><option value="session">session</option>
          </select></div>
        <div><label style="font-size:12px;color:var(--muted);"><input id="ctxApproved" type="checkbox" /> Đã duyệt (tự khai)</label></div>
        <button class="btn" onclick="ingestContextFromForm()">Thêm</button>
      </div>
      <div class="empty" style="margin-top:6px;">department/company chưa có tác dụng inject xuyên project — pilot chỉ có 1 project, chưa test được thật (xem MVP3-PROGRESS.md).</div>
      <div id="ctxResult" class="empty" style="margin-top:8px;"></div>
    </div>`;

  const tablesHtml = projects.map((p, i) => `
    <div class="panel">
      <h2>Project Memory — ${esc(p.name)}</h2>
      ${notesByProject[i].context_notes.length ? `<table><thead><tr><th>Loại</th><th>Scope</th><th>Nội dung</th><th>Người tạo</th><th>Lúc</th><th>Confidence (Q15)</th></tr></thead>
      <tbody>${notesByProject[i].context_notes.map((c) => `
        <tr><td><span class="pill warn">${esc(c.type)}</span></td><td><span class="pill ok">${esc(c.scope_level)}</span></td><td>${esc(c.content)}</td>
        <td>${esc(c.created_by_name)}</td><td>${fmtDate(c.created_at)}</td>
        <td><span class="pill ${c.confidence >= 70 ? 'ok' : c.confidence >= 30 ? 'warn' : 'danger'}">${esc(c.confidence)}%</span></td></tr>`).join('')}</tbody></table>` :
      '<div class="empty">Chưa có ghi chú context nào cho project này.</div>'}
    </div>`).join('') || '<div class="panel empty">Chưa có project nào.</div>';

  root.innerHTML = formHtml + tablesHtml;
}

async function ingestContextFromForm() {
  const resultEl = document.getElementById('ctxResult');
  const project_id = document.getElementById('ctxProject').value;
  const task_id = document.getElementById('ctxTaskId').value.trim() || undefined;
  const type = document.getElementById('ctxType').value;
  const content = document.getElementById('ctxContent').value.trim();
  const scope_level = document.getElementById('ctxScopeLevel').value;
  const approved_by = document.getElementById('ctxApproved').checked;
  if (!content) { resultEl.textContent = 'Cần nhập nội dung.'; return; }
  try {
    const res = await apiPost('/v1/context/ingest', { project_id, task_id, type, content, scope_level, approved_by });
    resultEl.textContent = `Đã tạo: ${res.context_id}`;
    switchTab('memory');
  } catch (e) {
    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function renderSeats(root) {
  const { employees } = await api('/v1/employees');
  const isAdmin = state.who?.role === 'admin';
  root.innerHTML = `<div class="panel"><h2>Seats & Employees</h2>
    <table><thead><tr><th>Nhân viên</th><th>Email</th><th>Trạng thái</th><th>Seat</th><th>Trạng thái seat</th>${isAdmin ? '<th></th>' : ''}</tr></thead>
    <tbody>${employees.map((e) => `
      <tr><td>${esc(e.full_name)}</td><td>${esc(e.email)}</td>
      <td><span class="pill ${e.status === 'active' ? 'ok' : 'danger'}">${esc(e.status)}</span></td>
      <td>${e.seat_id ? `<code>${esc(e.seat_id)}</code>` : '<span class="empty">chưa gán seat</span>'}</td>
      <td>${e.seat_status ? `<span class="pill ${e.seat_status === 'healthy' ? 'ok' : 'danger'}">${esc(e.seat_status)}</span>` : '—'}</td>
      ${isAdmin ? `<td>${e.seat_id && e.seat_status !== 'destroyed' ? `<a class="linkbtn" onclick="offboardSeat('${esc(e.seat_id)}')">Offboard</a>` : ''}</td>` : ''}</tr>`).join('')}
    </tbody></table></div>`;
}

async function offboardSeat(seatId) {
  const reason = prompt(`Lý do offboard seat ${seatId}? (sẽ cắt quyền truy cập AI thật ngay lập tức)`);
  if (!reason) return;
  if (!confirm(`Xác nhận offboard ${seatId}? Không thể hoàn tác qua dashboard.`)) return;
  try {
    await apiPost(`/v1/seats/${encodeURIComponent(seatId)}/offboard`, { reason });
    switchTab('seats');

async function generalizePattern() {
  const resultEl = document.getElementById('patResult');
  const title = document.getElementById('patTitle').value.trim();
  const category = document.getElementById('patCategory').value.trim();
  const content = document.getElementById('patContent').value.trim();
  if (!title || !category || !content) { resultEl.textContent = 'Cần nhập đủ tiêu đề, danh mục, nội dung.'; return; }
  try {
    const res = await apiPost('/v1/pattern-library/generalize', { title, category, content });
    resultEl.textContent = `Đã đề xuất: ${res.pattern_id} — chờ admin (khác bạn) duyệt.`;
    switchTab('patterns');

    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function grantFullAuditMode() {
  const resultEl = document.getElementById('faResult');
  const scope = document.getElementById('faScope').value;
  const scope_id = document.getElementById('faScopeId').value.trim();
  const duration_hours = Number(document.getElementById('faHours').value) || 4;
  const reason = document.getElementById('faReason').value.trim();
  if (!scope_id || !reason) { resultEl.textContent = 'Cần nhập Scope ID và Lý do.'; return; }
  try {
    const res = await apiPost('/v1/governance/full-audit-mode', { scope, scope_id, reason, duration_hours });
    resultEl.textContent = `Đã bật — hết hạn lúc ${fmtDate(res.expires_at)}.`;
    switchTab('governance');
  } catch (e) {
    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function revokeGrant(grantId) {
  if (!confirm('Revoke grant này ngay? (grant vẫn còn hiệu lực cho tới khi hết hạn nếu không revoke)')) return;
  try {
    await apiPost(`/v1/governance/full-audit-mode/${encodeURIComponent(grantId)}/revoke`, {});
    switchTab('governance');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

async function setProjectClassification() {
  const resultEl = document.getElementById('clsResult');
  const projectId = document.getElementById('clsProject').value;
  const classification = document.getElementById('clsValue').value;
  try {
    await apiPost(`/v1/projects/${encodeURIComponent(projectId)}/classification`, { classification });
    resultEl.textContent = `Đã đặt phân loại: ${classification}`;
    switchTab('governance');
  } catch (e) {
    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function createPolicy() {
  const resultEl = document.getElementById('polResult');
  const scope = document.getElementById('polScope').value;
  const classification = document.getElementById('polClass').value;
  const requires_approval = document.getElementById('polRequiresApproval').checked;
  const body = { scope, classification, requires_approval };
  if (scope === 'project') body.scope_id = document.getElementById('polProject').value;
  try {
    await apiPost('/v1/policies', body);
    resultEl.textContent = 'Đã tạo policy.';
    switchTab('governance');
  } catch (e) {
    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function decideApproval(id, approve) {
  try {
    if (approve) {
      const hours = prompt('Duyệt trong bao nhiêu giờ?', '4');
      if (hours === null) return;
      await apiPost(`/v1/governance/approval-requests/${encodeURIComponent(id)}/approve`, { duration_hours: Number(hours) || 4 });
    } else {
      if (!confirm('Từ chối yêu cầu này?')) return;
      await apiPost(`/v1/governance/approval-requests/${encodeURIComponent(id)}/reject`, {});
    }
    switchTab('governance');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

      <tbody>${kpi.collaboration.map((c) => `
        <tr><td>${esc(c.full_name || c.employee_id)}</td><td>${esc(c.handoffs_created)}</td>
        <td>${c.handoff_completeness_rate !== null ? esc(c.handoff_completeness_rate) + '%' : '—'}</td>
        <td>${c.avg_pickup_time_hours !== null ? esc(c.avg_pickup_time_hours) : '—'}</td>
        <td>${esc(c.context_contributions)}</td><td>${esc(c.decisions_documented)}</td></tr>`).join('') || '<tr><td colspan="6" class="empty">Chưa có dữ liệu.</td></tr>'}
      </tbody></table>
    </div>

    <div class="panel">
      <h2>Outcome</h2>
      <div class="empty">${esc(kpi.outcome_note)}</div>
    </div>`;
}

function renderTabs() {
  const visible = TABS.filter((t) => !t.adminOnly || state.who.role === 'admin');
  document.getElementById('tabs').innerHTML = visible.map((t) =>
    `<button class="${state.active === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}
async function switchTab(id) {
  state.active = id;
  renderTabs();
  const root = document.getElementById('content');
  root.innerHTML = '<div class="empty">Đang tải…</div>';
  try {
    await TABS.find((t) => t.id === id).render(root);
  } catch (e) {
    root.innerHTML = `<div class="panel"><div class="empty">Lỗi tải dữ liệu: ${esc(e.message)}</div></div>`;
  }
}

function boot() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('whoami').textContent = `${state.who.full_name} (${state.who.employee_id})`;
  renderTabs();
  switchTab(state.active);
}

(function init() {
  const saved = loadSession();
  if (saved && saved.token) {
    state = { ...saved, active: 'home' };
    boot();
  }
})();
</script>
</body>
</html>
