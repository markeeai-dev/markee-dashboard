<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Center AI — Ops Dashboard</title>
<style>
  /* Giữ NGUYÊN tên biến CSS cũ (--bg/--panel/--border/--text/--muted/--accent/--ok/--warn/
     --danger) — các hàm render dùng inline style trỏ thẳng vào chúng, đổi tên là vỡ hết.
     Chỉ đổi GIÁ TRỊ + thêm biến mới, nên toàn bộ 11 tab tự đẹp lên mà không phải sửa JS. */
  :root {
    --bg:#0b0e14; --surface:#111621; --panel:#141a26; --panel-hi:#19202e;
    --border:#222b3d; --border-hi:#2e3a52;
    --text:#e9edf5; --muted:#8792a8; --faint:#5d6880;
    --accent:#4c8dff; --accent-hi:#6ba1ff; --accent-dim:rgba(76,141,255,.12);
    --ok:#3ecf8e; --warn:#e6a338; --danger:#f0616d;
    --radius:10px; --radius-sm:6px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
    --sidebar-w: 224px;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; font-family:var(--font); background:var(--bg); color:var(--text);
         font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  ::selection { background:var(--accent-dim); }

  /* ---- Vỏ ứng dụng: sidebar cố định + vùng nội dung cuộn riêng ----
     Trước đây 11 tab xếp ngang bị TRÀN/cắt mất ở cửa sổ hẹp (lỗi thật, thấy trên ảnh chụp
     màn hình của người dùng). Sidebar dọc chứa thoải mái, không bao giờ tràn dù thêm tab. */
  #app { display:grid; grid-template-columns:var(--sidebar-w) 1fr; height:100vh; }

  #sidebar { background:var(--surface); border-right:1px solid var(--border);
             display:flex; flex-direction:column; overflow-y:auto; }
  .brand { padding:18px 18px 14px; border-bottom:1px solid var(--border); }
  .brand-name { font-size:15px; font-weight:650; letter-spacing:-.01em; display:flex; align-items:center; gap:8px; }
  .brand-dot { width:8px; height:8px; border-radius:50%; background:var(--accent);
               box-shadow:0 0 0 3px var(--accent-dim); flex:none; }
  .brand-sub { font-size:11px; color:var(--faint); margin-top:4px; letter-spacing:.02em; }
  .nav-group { padding:14px 10px 0; }
  .nav-group-label { font-size:10px; color:var(--faint); text-transform:uppercase;
                     letter-spacing:.09em; font-weight:600; padding:0 8px 6px; }
  nav button { display:flex; align-items:center; gap:9px; width:100%; text-align:left;
               background:none; border:none; color:var(--muted); padding:7px 8px;
               border-radius:var(--radius-sm); cursor:pointer; font-size:13px;
               font-family:inherit; margin-bottom:1px; transition:background .12s, color .12s; }
  nav button:hover { background:var(--panel); color:var(--text); }
  nav button.active { background:var(--accent-dim); color:var(--accent-hi); font-weight:550; }
  nav button .ico { width:15px; text-align:center; flex:none; opacity:.85; font-size:12px; }
  .sidebar-foot { margin-top:auto; padding:12px 14px; border-top:1px solid var(--border);
                  font-size:12px; color:var(--faint); }
  .sidebar-foot .who-name { color:var(--text); font-weight:550; font-size:13px; }
  .sidebar-foot .who-role { display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px;
                            background:var(--panel-hi); color:var(--muted); margin-left:6px;
                            text-transform:uppercase; letter-spacing:.05em; }

  #mainpane { overflow-y:auto; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px;
            padding:0 26px; height:56px; border-bottom:1px solid var(--border);
            position:sticky; top:0; background:rgba(11,14,20,.85);
            backdrop-filter:blur(8px); z-index:5; }
  .topbar h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:-.01em; }
  main { padding:22px 26px 60px; max-width:1240px; }

  /* ---- Panel / bảng / pill: dùng chung bởi cả 11 tab ---- */
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
           padding:16px 18px; margin-bottom:14px; }
  .panel h2 { font-size:12px; margin:0 0 12px; color:var(--muted); text-transform:uppercase;
              letter-spacing:.07em; font-weight:600; }

  /* Bảng rộng tự cuộn NGANG trong khung của nó — không bao giờ để cả trang trượt ngang.
     KHÔNG dùng white-space:nowrap: các bảng như Project Memory/Pattern Library có ô nội dung
     dài, ép 1 dòng sẽ tạo bảng rộng vô lý phải kéo ngang mới đọc được. Cho chữ xuống dòng tự
     nhiên, chỉ cuộn khi thật sự không đủ chỗ. */
  .panel table { display:block; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px;
          font-variant-numeric:tabular-nums; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
  th { color:var(--faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover td { background:var(--panel-hi); }

  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px;
          font-weight:550; white-space:nowrap; }
  .pill.ok { background:rgba(62,207,142,.13); color:var(--ok); box-shadow:inset 0 0 0 1px rgba(62,207,142,.2); }
  .pill.warn { background:rgba(230,163,56,.13); color:var(--warn); box-shadow:inset 0 0 0 1px rgba(230,163,56,.2); }
  .pill.danger { background:rgba(240,97,109,.13); color:var(--danger); box-shadow:inset 0 0 0 1px rgba(240,97,109,.2); }

  .home-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; align-items:start; }
  @media (max-width:1000px) { .home-grid { grid-template-columns:1fr; } }
  .empty { color:var(--faint); font-size:13px; padding:6px 0; }

  /* ---- Dải số tổng quan trên Trang chủ: tóm tắt trước, chi tiết sau ---- */
  .stats { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:14px; }
  @media (max-width:1000px) { .stats { grid-template-columns:repeat(2, 1fr); } }
  @media (max-width:520px) { .stats { grid-template-columns:1fr; } }
  .stat { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:15px 16px; }
  .stat-label { font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  .stat-value { font-size:26px; font-weight:640; margin:6px 0 2px; letter-spacing:-.02em;
                font-variant-numeric:tabular-nums; line-height:1.1; }
  .stat-sub { font-size:11px; color:var(--faint); }
  .stat.accent .stat-value { color:var(--accent-hi); }

  /* ---- Tab "AI đang biết gì": hiện đúng nội dung 5 file .md Claude Code đọc ---- */
  .mdfile { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
  .mdfile-head { display:flex; align-items:center; justify-content:space-between; gap:10px;
                 padding:9px 13px; background:var(--panel-hi); border-bottom:1px solid var(--border); }
  .mdfile-name { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--accent-hi); }
  .mdfile-desc { font-size:11px; color:var(--faint); }
  .mdfile pre { margin:0; padding:13px; font-family:var(--mono); font-size:12px; line-height:1.65;
                color:var(--text); background:var(--bg); overflow-x:auto;
                white-space:pre-wrap; word-break:break-word; }
  .mdfile pre.placeholder { color:var(--faint); font-style:italic; }
  .notice { background:var(--accent-dim); border:1px solid rgba(76,141,255,.25); border-radius:var(--radius);
            padding:11px 14px; font-size:12px; color:var(--text); margin-bottom:14px; line-height:1.6; }

  /* Dòng sự kiện/ghi chú trên Trang chủ */
  .feed-item { padding:9px 0; border-bottom:1px solid var(--border); }
  .feed-item:last-child { border-bottom:none; }
  .feed-item:first-child { padding-top:0; }
  .feed-main { font-size:13px; }
  .feed-meta { font-size:11px; color:var(--faint); margin-top:3px; }

  /* ---- Form controls (các render function dùng inline style trỏ vào biến trên, phần này
         lo cho control không có inline style) ---- */
  input, select, textarea { font-family:inherit; font-size:13px; color:var(--text);
    background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:7px 10px; outline:none; transition:border-color .12s, box-shadow .12s; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  input::placeholder { color:var(--faint); }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
    outline:2px solid var(--accent); outline-offset:2px; }

  .btn { background:var(--accent); color:#fff; border:none; padding:8px 15px;
         border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-weight:550;
         font-family:inherit; transition:background .12s; }
  .btn:hover { background:var(--accent-hi); }
  code { background:var(--bg); border:1px solid var(--border); padding:1px 5px;
         border-radius:4px; font-size:12px; font-family:var(--mono); color:var(--muted); }
  a.linkbtn { color:var(--accent); text-decoration:none; font-size:12px; cursor:pointer; font-weight:550; }
  a.linkbtn:hover { color:var(--accent-hi); text-decoration:underline; }

  /* ---- Màn đăng nhập ---- */
  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border);
                border-radius:14px; padding:28px; }
  .login-brand { display:flex; align-items:center; gap:9px; font-size:17px; font-weight:650;
                 margin-bottom:4px; letter-spacing:-.01em; }
  .login-sub { color:var(--faint); font-size:12px; margin-bottom:22px; }
  #loginScreen input { width:100%; margin:6px 0 14px; padding:9px 11px; }
  #loginScreen label { font-size:12px; color:var(--muted); font-weight:550; }
  #loginScreen .btn { width:100%; padding:10px; margin-top:4px; }
  #loginError { color:var(--danger); font-size:12px; min-height:17px; }

  @media (max-width:760px) {
    #app { grid-template-columns:1fr; height:auto; }
    #sidebar { border-right:none; border-bottom:1px solid var(--border); }
    .nav-group { display:flex; flex-wrap:wrap; gap:4px; padding:8px; }
    .nav-group-label { width:100%; }
    nav button { width:auto; }
    .sidebar-foot { margin-top:0; }
    main { padding:16px; }
    .topbar { padding:0 16px; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand"><span class="brand-dot"></span> Center AI</div>
    <div class="login-sub">Enterprise AI Operations · Pilot</div>
    <!-- Mặc định "/api" = đường same-origin (nginx proxy sang Control Plane). Trước đây trỏ
         thẳng https://cp.valeron.tech — request cross-origin, hay bị ad-blocker/extension/
         firewall công ty chặn thẳng ở tầng mạng, báo "Failed to fetch" dù server hoàn toàn
         bình thường (gặp thật). Vẫn sửa được thành URL tuyệt đối nếu cần trỏ Control Plane khác. -->
    <label>Control Plane URL</label>
    <input id="cpUrl" value="/api" />
    <label>Email công ty</label>
    <input id="cpEmail" placeholder="thanh@company.local" />
    <label>Mã pilot access code</label>
    <input id="cpAccessCode" type="password" placeholder="do admin cấp riêng" />
    <div id="loginError"></div>
    <button class="btn" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-name"><span class="brand-dot"></span> Center AI</div>
      <div class="brand-sub">Enterprise AI Operations</div>
    </div>
    <nav id="tabs"></nav>
    <div class="sidebar-foot">
      <div><span class="who-name" id="whoami"></span><span class="who-role" id="whorole"></span></div>
      <a class="linkbtn" onclick="logout()">Đăng xuất</a>
    </div>
  </aside>
  <div id="mainpane">
    <div class="topbar">
      <h1 id="pagetitle"></h1>
      <div style="font-size:12px;color:var(--faint);" id="pagehint"></div>
    </div>
    <main id="content"></main>
  </div>
</div>

<script>
// `group` + `hint` thêm cho điều hướng dễ quét (11 mục phẳng xếp ngang trước đây vừa khó
// tìm vừa TRÀN mất chữ ở cửa sổ hẹp — lỗi thật). `id`/`label`/`render`/`adminOnly` giữ
// nguyên, switchTab/boot vẫn dùng đúng như cũ.
const TABS = [
  { id: 'home', label: 'Trang chủ', ico: '◈', group: 'Tổng quan', hint: 'Ai đang làm gì, cần tiếp quản gì', render: renderHome },
  { id: 'inbox', label: 'Inbox', ico: '▤', group: 'Tổng quan', hint: 'Việc liên quan tới bạn hôm nay', render: renderInbox },
  { id: 'timeline', label: 'Timeline', ico: '◷', group: 'Tổng quan', hint: 'Dòng sự kiện của dự án theo thời gian', render: renderTimeline },
  { id: 'projects', label: 'Projects & Tasks', ico: '▦', group: 'Công việc', hint: 'Tạo task, giao người, đổi trạng thái', render: renderProjects },
  { id: 'sessions', label: 'Active Sessions', ico: '●', group: 'Công việc', hint: 'Phiên làm việc AI đang mở', render: renderSessions },
  { id: 'handoffs', label: 'Handoffs', ico: '⇄', group: 'Công việc', hint: 'Bàn giao — thứ giúp người sau hiểu việc trong vài phút', render: renderHandoffs },
  { id: 'bundle', label: 'AI đang biết gì', ico: '◎', group: 'Tri thức', hint: 'Chính xác nội dung Claude Code đọc mỗi phiên — không phải bản mô phỏng', render: renderBundle },
  { id: 'memory', label: 'Project Memory', ico: '◫', group: 'Tri thức', hint: 'Requirement, quyết định kỹ thuật, ghi chú BA', render: renderMemory },
  { id: 'patterns', label: 'Pattern Library', ico: '✦', group: 'Tri thức', hint: 'Giải pháp tổng quát đã ẩn danh hoá, dùng lại cho dự án khác', render: renderPatternLibrary },
  { id: 'seats', label: 'Seats & Employees', ico: '◉', group: 'Quản trị', hint: 'Cấp/thu hồi seat AI cho nhân viên', render: renderSeats },
  { id: 'governance', label: 'Governance', ico: '◆', group: 'Quản trị', hint: 'Bảo mật, phân loại dữ liệu, duyệt truy cập', render: renderGovernance, adminOnly: true },
  { id: 'kpi', label: 'KPI', ico: '▲', group: 'Quản trị', hint: 'Adoption / Efficiency / Collaboration', render: renderKpi, adminOnly: true },
];
let state = { cpUrl: '', token: '', who: null, active: 'home' };

function loadSession() {
  try { return JSON.parse(localStorage.getItem('centerai_dashboard_session') || 'null'); } catch { return null; }
}
function saveSession() {
  localStorage.setItem('centerai_dashboard_session', JSON.stringify({ cpUrl: state.cpUrl, token: state.token, who: state.who }));
}
function logout() {
  localStorage.removeItem('centerai_dashboard_session');
  location.reload();
}

// 9Router đôi khi nối "data: [DONE]" ngay sau JSON (phát hiện thật ở Bước 1) — Control
// Plane tự nó không có vấn đề này, nhưng parse phòng thủ cho đồng nhất với các nơi khác.
async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text.split('data: [DONE]')[0].trim()); } catch { return {}; }
}

async function api(path) {
  const res = await fetch(state.cpUrl.replace(/\/$/, '') + path, {
    headers: { Authorization: `Bearer ${state.token}` },
  });
  const json = await safeJson(res);
  if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
  return json;
}
async function apiPost(path, body) {
  const res = await fetch(state.cpUrl.replace(/\/$/, '') + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
    body: JSON.stringify(body || {}),
  });
  const json = await safeJson(res);
  if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
  return json;
}

async function doLogin() {
  const cpUrl = document.getElementById('cpUrl').value.trim();
  const email = document.getElementById('cpEmail').value.trim();
  const accessCode = document.getElementById('cpAccessCode').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch(cpUrl.replace(/\/$/, '') + '/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, access_code: accessCode }),
    });
    const json = await safeJson(res);
    if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
    state = { cpUrl, token: json.employee_token, who: { full_name: json.full_name, employee_id: json.employee_id, role: json.role }, active: 'home' };
    saveSession();
    boot();
  } catch (e) {
    errEl.textContent = 'Đăng nhập thất bại: ' + e.message;
  }
}

function fmtElapsed(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h${mins % 60}m`;
}
function fmtDate(iso) { return new Date(iso).toLocaleString('vi-VN'); }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

async function renderHome(root) {
  const [sessions, inbox] = await Promise.all([api('/v1/work-sessions'), api(`/v1/inbox?employee_id=${encodeURIComponent(state.who.employee_id)}`)]);
  let contextNotes = [];
  try {
    const projects = await api('/v1/projects');
    const notesByProject = await Promise.all(projects.projects.map((p) => api(`/v1/projects/${p.id}/context-notes`).catch(() => ({ context_notes: [] }))));
    contextNotes = notesByProject.flatMap((n) => n.context_notes).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
  } catch {}

  // cost-summary hiện mở cho mọi nhân viên (chỉ requireEmployee, không requireAdmin) — giữ
  // đúng hành vi sẵn có, không âm thầm đổi quyền trong lúc chỉ làm lại giao diện. Vẫn bắt lỗi
  // để nếu endpoint hỏng/đổi quyền sau này thì chỉ mất dải số, không sập cả Trang chủ.
  let cost = null;
  try { cost = await api('/v1/cost-summary'); } catch {}

  let statsHtml = '';
  if (cost && cost.cost_by_employee) {
    const totalCost = cost.cost_by_employee.reduce((s, e) => s + Number(e.total_estimated_cost_usd || 0), 0);
    const totalReq = cost.cost_by_employee.reduce((s, e) => s + Number(e.request_count || 0), 0);
    const weighted = cost.cost_by_employee.reduce((s, e) => s + Number(e.avg_latency_ms || 0) * Number(e.request_count || 0), 0);
    const avgLatency = totalReq ? Math.round(weighted / totalReq) : 0;
    statsHtml = `
      <div class="stats">
        <div class="stat accent">
          <div class="stat-label">Đang làm</div>
          <div class="stat-value">${sessions.work_sessions.length}</div>
          <div class="stat-sub">phiên AI đang mở</div>
        </div>
        <div class="stat">
          <div class="stat-label">Chi phí AI</div>
          <div class="stat-value">$${totalCost.toFixed(2)}</div>
          <div class="stat-sub">${cost.cost_by_employee.length} nhân viên, cộng dồn</div>
        </div>
        <div class="stat">
          <div class="stat-label">Request</div>
          <div class="stat-value">${totalReq.toLocaleString('vi-VN')}</div>
          <div class="stat-sub">đã đi qua gateway công ty</div>
        </div>
        <div class="stat">
          <div class="stat-label">Độ trễ TB</div>
          <div class="stat-value">${(avgLatency / 1000).toFixed(2)}s</div>
          <div class="stat-sub">trung bình theo số request</div>
        </div>
      </div>`;
  }

  root.innerHTML = statsHtml + `
    <div class="home-grid">
      <div class="panel">
        <h2>Đang làm</h2>
        ${sessions.work_sessions.length ? sessions.work_sessions.map((s) => `
          <div class="feed-item">
            <div class="feed-main"><b>${esc(s.employee_name)}</b> — ${esc(s.task_title)}</div>
            <div class="feed-meta"><code>${esc(s.task_id)}</code> · ${esc(s.project_name)} · hoạt động ${fmtElapsed(s.last_activity_at)} trước</div>
          </div>`).join('') : '<div class="empty">Không có ai đang làm.</div>'}
      </div>
      <div class="panel">
        <h2>Cần tiếp quản (của tôi)</h2>
        ${inbox.handoffs_to_pick_up.length ? inbox.handoffs_to_pick_up.map((h) => `
          <div class="feed-item">

async function createTaskFromForm(projectId) {
  const resultEl = document.getElementById(`taskResult-${projectId}`);
  const title = document.getElementById(`taskTitle-${projectId}`).value.trim();
  const assignee_employee_id = document.getElementById(`taskAssignee-${projectId}`).value || undefined;
  if (!title) { resultEl.textContent = 'Cần nhập tiêu đề.'; return; }
  try {
    const res = await apiPost(`/v1/projects/${encodeURIComponent(projectId)}/tasks`, { title, assignee_employee_id });
    resultEl.textContent = `Đã tạo: ${res.task_id}`;
    switchTab('projects');
  } catch (e) {
    resultEl.textContent = 'Lỗi: ' + e.message;
  }
}

async function updateTaskField(taskId, field, value) {
  // assignee_employee_id chỉ gán được, chưa có đường "bỏ gán" ở Control Plane (ngoài phạm vi
  // đợt này) — chọn "— chưa gán —" không gọi API, tránh lỗi 400 vô nghĩa (no_fields_to_update).
  if (!value) { switchTab('projects'); return; }
  try {
    await apiPost(`/v1/tasks/${encodeURIComponent(taskId)}/update`, { [field]: value });
    switchTab('projects');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

const BUNDLE_FILE_DESC = {

async function renderBundle(root) {
  const { projects } = await api('/v1/projects');
  if (!projects.length) { root.innerHTML = '<div class="panel empty">Chưa có project nào.</div>'; return; }
  if (!state.bundleProjectId || !projects.some((p) => p.id === state.bundleProjectId)) {
    state.bundleProjectId = projects[0].id;
  }
  const { tasks } = await api(`/v1/projects/${encodeURIComponent(state.bundleProjectId)}/tasks`);
  if (!state.bundleTaskId || !tasks.some((t) => t.id === state.bundleTaskId)) {
    state.bundleTaskId = tasks.length ? tasks[0].id : null;
  }

  const picker = `
    <div class="panel">
      <h2>Chọn task để xem AI được bơm gì</h2>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:end;">
        <div><label style="font-size:12px;color:var(--muted);">Project</label><br/>
          <select onchange="state.bundleProjectId=this.value; state.bundleTaskId=null; switchTab('bundle')">
            ${projects.map((p) => `<option value="${esc(p.id)}" ${p.id === state.bundleProjectId ? 'selected' : ''}>${esc(p.name)}</option>`).join('')}
          </select></div>
        <div style="flex:1;min-width:240px;"><label style="font-size:12px;color:var(--muted);">Task</label><br/>
          <select style="width:100%;" onchange="state.bundleTaskId=this.value; switchTab('bundle')">
            ${tasks.map((t) => `<option value="${esc(t.id)}" ${t.id === state.bundleTaskId ? 'selected' : ''}>${esc(t.title)}</option>`).join('') || '<option>— chưa có task —</option>'}
          </select></div>
      </div>
    </div>`;

  if (!state.bundleTaskId) { root.innerHTML = picker + '<div class="panel empty">Project này chưa có task nào.</div>'; return; }

  const bundle = await api(`/v1/context/bundle?task_id=${encodeURIComponent(state.bundleTaskId)}`);
  const st = bundle.stats;
  const filesHtml = Object.entries(BUNDLE_FILE_DESC).map(([key, [name, desc]]) => {
    const content = bundle.files[key] || '';
    const isPlaceholder = content.trim().startsWith('<!--');
    return `
      <div class="mdfile">
        <div class="mdfile-head">
          <span class="mdfile-name">${esc(name)}</span>
          <span class="mdfile-desc">${esc(desc)}</span>
        </div>
        <pre class="${isPlaceholder ? 'placeholder' : ''}">${esc(content.trim())}</pre>
      </div>`;
  }).join('');

  root.innerHTML = picker + `
    <div class="notice">
      <b>Đây là nội dung thật, không phải bản mô phỏng.</b> Mỗi lần nhân viên chạy
      <code>company-ai claude</code>, đúng 5 file này được ghi vào <code>.center-ai/generated/</code>
      và Claude Code tự đọc qua marker trong <code>CLAUDE.md</code>. Dashboard và CLI gọi chung
      một endpoint nên không thể lệch nhau.
      ${st ? `<br/>Đã lọc trùng: <b>${st.notes_total}</b> ghi chú → <b>${st.notes_after_dedup}</b> còn lại (tối đa ${st.max_notes_per_file}/file, ưu tiên decision/requirement đã duyệt).` : ''}
    </div>
    ${filesHtml}
    ${state.who.role === 'admin' ? `
    <div class="panel">
      <h2>+ Thêm tri thức công ty / team</h2>
      <div class="empty" style="margin-bottom:10px;">Nội dung này vào AI của <b>mọi dự án, mọi nhân viên</b> — nên chỉ admin thêm được.</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:end;">
        <div><label style="font-size:12px;color:var(--muted);">Phạm vi</label><br/>
          <select id="kbScope">
            <option value="company">Toàn công ty (company.md)</option>
            <option value="department">Team (team.md)</option>
          </select></div>
        <div><label style="font-size:12px;color:var(--muted);">Loại</label><br/>
          <select id="kbType">
            <option value="decision">decision</option><option value="requirement">requirement</option>
            <option value="known_issue">known_issue</option><option value="code_context">code_context</option>
          </select></div>
        <div style="flex:1;min-width:280px;"><label style="font-size:12px;color:var(--muted);">Nội dung</label><br/>
          <input id="kbContent" style="width:100%;" placeholder="VD: Mọi API ra ngoài phải có timeout + retry backoff" /></div>
        <button class="btn" onclick="addCompanyKnowledge()">Thêm</button>
      </div>
      <div id="kbResult" class="empty" style="margin-top:8px;"></div>

async function offboardSeat(seatId) {
  const reason = prompt(`Lý do offboard seat ${seatId}? (sẽ cắt quyền truy cập AI thật ngay lập tức)`);
  if (!reason) return;
  if (!confirm(`Xác nhận offboard ${seatId}? Không thể hoàn tác qua dashboard.`)) return;
  try {
    await apiPost(`/v1/seats/${encodeURIComponent(seatId)}/offboard`, { reason });
    switchTab('seats');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

// Nửa "gán" đối xứng với offboardSeat — mục cuối "Workflow duyệt gán/thu hồi seat" (mục 14).
async function assignSeat(seatId) {
  const { employees } = await api('/v1/employees');
  const list = employees.map((e) => `${e.id} — ${e.full_name}`).join('\n');
  const employeeId = prompt(`Gán seat ${seatId} cho nhân viên nào? Gõ đúng employee_id:\n${list}`);
  if (!employeeId) return;
  if (!employees.some((e) => e.id === employeeId)) { alert('employee_id không hợp lệ.'); return; }
  const reason = prompt(`Lý do gán seat ${seatId} cho ${employeeId}?`);
  if (!reason) return;
  try {
    await apiPost(`/v1/seats/${encodeURIComponent(seatId)}/assign`, { employee_id: employeeId, reason });
    switchTab('seats');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

async function decideApproval(id, approve) {
  try {
    if (approve) {
      const hours = prompt('Duyệt trong bao nhiêu giờ?', '4');
      if (hours === null) return;
      await apiPost(`/v1/governance/approval-requests/${encodeURIComponent(id)}/approve`, { duration_hours: Number(hours) || 4 });
    } else {
      if (!confirm('Từ chối yêu cầu này?')) return;
      await apiPost(`/v1/governance/approval-requests/${encodeURIComponent(id)}/reject`, {});
    }
    switchTab('governance');
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

        <tr><td>${esc(a.full_name || a.employee_id)}</td><td>${esc(a.ai_active_days)}</td>
        <td>${Object.entries(a.tool_adoption).map(([t, n]) => `${esc(t)}: ${esc(n)}`).join(', ') || '—'}</td></tr>`).join('') ||
        '<tr><td colspan="3" class="empty">Chưa có dữ liệu.</td></tr>'}
      </tbody></table>
      <div class="empty" style="margin-top:8px;">Không có "tỷ lệ session classified" — schema hiện tại chưa track classified/unclassified.</div>
    </div>

    <div class="panel">
      <h2>Efficiency</h2>
      <table><thead><tr><th>Nhân viên</th><th>Cost TB / task đã đóng</th><th>Token TB / task đã đóng</th><th>Số task đã đóng</th></tr></thead>
      <tbody>${kpi.efficiency.map((e) => `
        <tr><td>${esc(e.full_name || e.employee_id)}</td>
        <td>${e.avg_cost_per_closed_task !== null ? '$' + esc(e.avg_cost_per_closed_task) : '—'}</td>
        <td>${e.avg_tokens_per_closed_task !== null ? esc(e.avg_tokens_per_closed_task) : '—'}</td>
        <td>${esc(e.closed_task_count)}</td></tr>`).join('') || '<tr><td colspan="4" class="empty">Chưa có dữ liệu.</td></tr>'}
      </tbody></table>
      <div class="empty" style="margin-top:8px;">"Task đã đóng" (status=closed) — proxy cho "accepted", schema chưa có trạng thái accepted riêng. Không có "time to first PR"/"retry rate" — hệ thống chưa track PR/số lần thử lại.</div>
    </div>

    <div class="panel">
      <h2>Collaboration</h2>
      <table><thead><tr><th>Nhân viên</th><th>Handoff đã tạo</th><th>% Handoff đầy đủ</th><th>TG tiếp quản TB (giờ)</th><th>Đóng góp context</th><th>ADR đã viết</th></tr></thead>
      <tbody>${kpi.collaboration.map((c) => `
        <tr><td>${esc(c.full_name || c.employee_id)}</td><td>${esc(c.handoffs_created)}</td>
        <td>${c.handoff_completeness_rate !== null ? esc(c.handoff_completeness_rate) + '%' : '—'}</td>
        <td>${c.avg_pickup_time_hours !== null ? esc(c.avg_pickup_time_hours) : '—'}</td>
        <td>${esc(c.context_contributions)}</td><td>${esc(c.decisions_documented)}</td></tr>`).join('') || '<tr><td colspan="6" class="empty">Chưa có dữ liệu.</td></tr>'}
      </tbody></table>
    </div>

    <div class="panel">
      <h2>Outcome</h2>
      <div class="empty">${esc(kpi.outcome_note)}</div>
    </div>`;
}

function renderTabs() {
  const visible = TABS.filter((t) => !t.adminOnly || state.who.role === 'admin');
  const groups = [];
  for (const t of visible) {
    let g = groups.find((x) => x.name === t.group);
    if (!g) { g = { name: t.group, items: [] }; groups.push(g); }
    g.items.push(t);
  }
  document.getElementById('tabs').innerHTML = groups.map((g) => `
    <div class="nav-group">
      <div class="nav-group-label">${esc(g.name)}</div>
      ${g.items.map((t) => `<button class="${state.active === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">
        <span class="ico">${t.ico}</span>${esc(t.label)}</button>`).join('')}
    </div>`).join('');
}
async function switchTab(id) {
  state.active = id;
  renderTabs();
  const tab = TABS.find((t) => t.id === id);
  document.getElementById('pagetitle').textContent = tab.label;
  document.getElementById('pagehint').textContent = tab.hint || '';
  const root = document.getElementById('content');
  root.innerHTML = '<div class="empty">Đang tải…</div>';
  try {
    await tab.render(root);
  } catch (e) {
    root.innerHTML = `<div class="panel"><div class="empty">Lỗi tải dữ liệu: ${esc(e.message)}</div></div>`;
  }
}

function boot() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'grid'; // #app là CSS grid (sidebar + nội dung)
  document.getElementById('whoami').textContent = state.who.full_name;
  document.getElementById('whorole').textContent = state.who.role === 'admin' ? 'admin' : 'member';
  renderTabs();
  switchTab(state.active);
}

(function init() {
  const saved = loadSession();
  if (saved && saved.token) {
    state = { ...saved, active: 'home' };
    boot();
  }
})();
</script>
</body>
</html>
