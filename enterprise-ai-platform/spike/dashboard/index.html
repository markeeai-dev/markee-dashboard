<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Center AI — Ops Dashboard (MVP1)</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --border:#262b36; --text:#e6e8ee; --muted:#8b93a7;
          --accent:#5b8cff; --ok:#33c17a; --warn:#e0a72e; --danger:#e05a5a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .who { color:var(--muted); font-size:13px; }
  nav { display:flex; gap:4px; padding:10px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--muted); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  nav button.active { background:var(--panel); color:var(--text); border-color:var(--border); }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
  .panel h2 { font-size:14px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--border); vertical-align:top; }
  th { color:var(--muted); font-weight:500; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
  .pill.ok { background:rgba(51,193,122,.15); color:var(--ok); }
  .pill.warn { background:rgba(224,167,46,.15); color:var(--warn); }
  .pill.danger { background:rgba(224,90,90,.15); color:var(--danger); }
  .home-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:16px; }
  @media (max-width:800px) { .home-grid { grid-template-columns: 1fr; } }
  .empty { color:var(--muted); font-size:13px; padding:8px 0; }
  #loginScreen { max-width:360px; margin:80px auto; }
  #loginScreen input { width:100%; padding:9px 10px; margin:6px 0 14px; background:#0c0e12; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; }
  #loginScreen label { font-size:12px; color:var(--muted); }
  #loginScreen button, .btn { background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:6px; cursor:pointer; font-size:14px; }
  #loginError { color:var(--danger); font-size:13px; min-height:18px; }
  code { background:#0c0e12; padding:1px 5px; border-radius:4px; font-size:12px; }
  a.linkbtn { color:var(--accent); text-decoration:none; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="panel">
    <h2>Đăng nhập Center AI</h2>
    <label>Control Plane URL</label>
    <input id="cpUrl" value="https://cp.valeron.tech" />
    <label>Email công ty</label>
    <input id="cpEmail" placeholder="thanh@company.local" />
    <label>Mã pilot access code</label>
    <input id="cpAccessCode" type="password" />
    <div id="loginError"></div>
    <button onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Center AI — Ops Dashboard <span style="color:var(--muted); font-weight:400;">(MVP1 pilot)</span></h1>
    <div class="who"><span id="whoami"></span> · <a class="linkbtn" onclick="logout()">đăng xuất</a></div>
  </header>
  <nav id="tabs"></nav>
  <main id="content"></main>
</div>

<script>
const TABS = [
  { id: 'home', label: 'Trang chủ', render: renderHome },
  { id: 'projects', label: 'Projects & Tasks', render: renderProjects },
  { id: 'sessions', label: 'Active Sessions', render: renderSessions },
  { id: 'handoffs', label: 'Handoffs', render: renderHandoffs },
  { id: 'memory', label: 'Project Memory', render: renderMemory },
  { id: 'seats', label: 'Seats & Employees', render: renderSeats },
];
let state = { cpUrl: '', token: '', who: null, active: 'home' };

function loadSession() {
  try { return JSON.parse(localStorage.getItem('centerai_dashboard_session') || 'null'); } catch { return null; }
}
function saveSession() {
  localStorage.setItem('centerai_dashboard_session', JSON.stringify({ cpUrl: state.cpUrl, token: state.token, who: state.who }));
}
function logout() {
  localStorage.removeItem('centerai_dashboard_session');
  location.reload();
}

// 9Router đôi khi nối "data: [DONE]" ngay sau JSON (phát hiện thật ở Bước 1) — Control
// Plane tự nó không có vấn đề này, nhưng parse phòng thủ cho đồng nhất với các nơi khác.
async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text.split('data: [DONE]')[0].trim()); } catch { return {}; }
}

async function api(path) {
  const res = await fetch(state.cpUrl.replace(/\/$/, '') + path, {
    headers: { Authorization: `Bearer ${state.token}` },
  });
  const json = await safeJson(res);
  if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
  return json;
}

async function doLogin() {
  const cpUrl = document.getElementById('cpUrl').value.trim();
  const email = document.getElementById('cpEmail').value.trim();
  const accessCode = document.getElementById('cpAccessCode').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch(cpUrl.replace(/\/$/, '') + '/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, access_code: accessCode }),
    });
    const json = await safeJson(res);
    if (res.status >= 400) throw new Error(json.error || `http_${res.status}`);
    state = { cpUrl, token: json.employee_token, who: { full_name: json.full_name, employee_id: json.employee_id }, active: 'home' };
    saveSession();
    boot();
  } catch (e) {
    errEl.textContent = 'Đăng nhập thất bại: ' + e.message;
  }
}

function fmtElapsed(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h${mins % 60}m`;
}
function fmtDate(iso) { return new Date(iso).toLocaleString('vi-VN'); }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

async function renderHome(root) {
  const [sessions, handoffs] = await Promise.all([api('/v1/work-sessions'), api('/v1/handoffs')]);
  let contextNotes = [];
  try {
    const projects = await api('/v1/projects');
    const notesByProject = await Promise.all(projects.projects.map((p) => api(`/v1/projects/${p.id}/context-notes`).catch(() => ({ context_notes: [] }))));
    contextNotes = notesByProject.flatMap((n) => n.context_notes).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
  } catch {}

  root.innerHTML = `
    <div class="home-grid">
      <div class="panel">
        <h2>Đang làm</h2>
        ${sessions.work_sessions.length ? sessions.work_sessions.map((s) => `
          <div style="margin-bottom:8px;">
            <b>${esc(s.employee_name)}</b> — ${esc(s.task_id)} — ${esc(s.task_title)}
            <div class="empty">${fmtElapsed(s.last_activity_at)} trước hoạt động gần nhất, ${esc(s.project_name)}</div>
          </div>`).join('') : '<div class="empty">Không có ai đang làm.</div>'}
      </div>
      <div class="panel">
        <h2>Cần tiếp quản</h2>
        ${handoffs.handoffs.length ? handoffs.handoffs.slice(0, 5).map((h) => `
          <div style="margin-bottom:8px;">
            <b>${esc(h.task_id)}</b> — handoff mới từ ${esc(h.from_employee_name)}
            <div class="empty">${fmtDate(h.created_at)}, ${esc(h.project_name)}</div>
          </div>`).join('') : '<div class="empty">Chưa có handoff nào.</div>'}
      </div>
      <div class="panel">
        <h2>Context mới</h2>
        ${contextNotes.length ? contextNotes.map((c) => `
          <div style="margin-bottom:8px;">[${esc(c.type)}] ${esc(c.content)}
            <div class="empty">${esc(c.created_by_name)} — ${fmtDate(c.created_at)}</div>
          </div>`).join('') : '<div class="empty">Chưa có ghi chú context nào (requirement/decision/BA feedback).</div>'}
      </div>
    </div>`;
}

async function renderProjects(root) {
  const { projects } = await api('/v1/projects');
  const taskLists = await Promise.all(projects.map((p) => api(`/v1/projects/${p.id}/tasks`)));
  root.innerHTML = projects.map((p, i) => `
    <div class="panel">
      <h2>${esc(p.name)} <span class="pill ok">${esc(p.status)}</span></h2>
      <table><thead><tr><th>Task ID</th><th>Tiêu đề</th><th>Trạng thái</th><th>Người phụ trách</th></tr></thead>
      <tbody>${taskLists[i].tasks.map((t) => `
        <tr><td><code>${esc(t.id)}</code></td><td>${esc(t.title)}</td>
        <td><span class="pill ${t.status === 'closed' ? 'ok' : 'warn'}">${esc(t.status)}</span></td>
        <td>${esc(t.assignee_employee_id || '—')}</td></tr>`).join('') || `<tr><td colspan="4" class="empty">Chưa có task</td></tr>`}
      </tbody></table>
    </div>`).join('') || '<div class="panel empty">Chưa có project nào.</div>';
}

async function renderSessions(root) {
  const { work_sessions } = await api('/v1/work-sessions');
  root.innerHTML = `<div class="panel"><h2>Active Sessions</h2>
    <table><thead><tr><th>Nhân viên</th><th>Project</th><th>Task</th><th>Bắt đầu</th><th>Hoạt động gần nhất</th></tr></thead>
    <tbody>${work_sessions.map((s) => `
      <tr><td>${esc(s.employee_name)}</td><td>${esc(s.project_name)}</td>
      <td><code>${esc(s.task_id)}</code> — ${esc(s.task_title)}</td>
      <td>${fmtDate(s.started_at)}</td><td>${fmtElapsed(s.last_activity_at)} trước</td></tr>`).join('') ||
      `<tr><td colspan="5" class="empty">Không có Work Session nào đang active.</td></tr>`}
    </tbody></table></div>`;
}

async function renderHandoffs(root) {
  const { handoffs } = await api('/v1/handoffs');
  root.innerHTML = `<div class="panel"><h2>Handoffs gần đây</h2>
    ${handoffs.length ? handoffs.map((h) => `
      <div class="panel" style="background:#12151c;">
        <div><b>${esc(h.task_id)}</b> — ${esc(h.task_title)} <span class="empty">(${esc(h.project_name)})</span></div>
        <div class="empty">Từ ${esc(h.from_employee_name)} — ${fmtDate(h.created_at)}</div>
        <div style="white-space:pre-wrap; margin:8px 0; font-size:13px;">${esc(h.summary)}</div>
        <div class="empty">Bước tiếp theo: ${(h.next_steps || []).map(esc).join(', ') || '(không có)'}</div>
        <div class="empty">Vấn đề mở: ${(h.open_issues || []).map(esc).join(', ') || '(không có)'}</div>
      </div>`).join('') : '<div class="empty">Chưa có handoff nào.</div>'}
    </div>`;
}

async function renderMemory(root) {
  const { projects } = await api('/v1/projects');
  const notesByProject = await Promise.all(projects.map((p) => api(`/v1/projects/${p.id}/context-notes`)));
  root.innerHTML = projects.map((p, i) => `
    <div class="panel">
      <h2>Project Memory — ${esc(p.name)}</h2>
      ${notesByProject[i].context_notes.length ? `<table><thead><tr><th>Loại</th><th>Nội dung</th><th>Người tạo</th><th>Lúc</th></tr></thead>
      <tbody>${notesByProject[i].context_notes.map((c) => `
        <tr><td><span class="pill warn">${esc(c.type)}</span></td><td>${esc(c.content)}</td>
        <td>${esc(c.created_by_name)}</td><td>${fmtDate(c.created_at)}</td></tr>`).join('')}</tbody></table>` :
      '<div class="empty">Chưa có ghi chú context nào cho project này.</div>'}
    </div>`).join('') || '<div class="panel empty">Chưa có project nào.</div>';
}

async function renderSeats(root) {
  const { employees } = await api('/v1/employees');
  root.innerHTML = `<div class="panel"><h2>Seats & Employees</h2>
    <table><thead><tr><th>Nhân viên</th><th>Email</th><th>Trạng thái</th><th>Seat</th><th>Trạng thái seat</th></tr></thead>
    <tbody>${employees.map((e) => `
      <tr><td>${esc(e.full_name)}</td><td>${esc(e.email)}</td>
      <td><span class="pill ${e.status === 'active' ? 'ok' : 'danger'}">${esc(e.status)}</span></td>
      <td>${e.seat_id ? `<code>${esc(e.seat_id)}</code>` : '<span class="empty">chưa gán seat</span>'}</td>
      <td>${e.seat_status ? `<span class="pill ${e.seat_status === 'healthy' ? 'ok' : 'danger'}">${esc(e.seat_status)}</span>` : '—'}</td></tr>`).join('')}
    </tbody></table></div>`;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map((t) =>
    `<button class="${state.active === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}
async function switchTab(id) {
  state.active = id;
  renderTabs();
  const root = document.getElementById('content');
  root.innerHTML = '<div class="empty">Đang tải…</div>';
  try {
    await TABS.find((t) => t.id === id).render(root);
  } catch (e) {
    root.innerHTML = `<div class="panel"><div class="empty">Lỗi tải dữ liệu: ${esc(e.message)}</div></div>`;
  }
}

function boot() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('whoami').textContent = `${state.who.full_name} (${state.who.employee_id})`;
  renderTabs();
  switchTab(state.active);
}

(function init() {
  const saved = loadSession();
  if (saved && saved.token) {
    state = { ...saved, active: 'home' };
    boot();
  }
})();
</script>
</body>
</html>
